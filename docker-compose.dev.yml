services:
  postgres:
    image: postgres:16-alpine
    container_name: creorga-db
    environment:
      POSTGRES_USER: creorga
      POSTGRES_PASSWORD: password
      POSTGRES_DB: creorga_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: creorga-redis
    ports:
      - "6380:6379"

volumes:
  postgres_dev_data:
