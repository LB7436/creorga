<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="light" />

    <!-- Primary SEO -->
    <title>Creorga OS — Le POS qui transforme votre restaurant au Luxembourg</title>
    <meta name="description" content="Creorga OS : la plateforme tout-en-un pour restaurants, bars et hôtels au Luxembourg. POS moderne, conformité TVA/HACCP/CNPD, IA intégrée." />
    <meta name="keywords" content="POS Luxembourg, logiciel restaurant, caisse enregistreuse, gestion café, HACCP Luxembourg, TVA, Creorga, gestion hôtel" />
    <meta name="author" content="Creorga" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://creorga.lu/" />
    <meta name="application-name" content="Creorga OS" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Creorga OS" />
    <meta property="og:title" content="Creorga OS — Le POS qui transforme votre restaurant" />
    <meta property="og:description" content="Plateforme tout-en-un pour restaurants, bars et hôtels au Luxembourg. POS moderne, conformité TVA/HACCP/CNPD, IA intégrée." />
    <meta property="og:url" content="https://creorga.lu/" />
    <meta property="og:locale" content="fr_LU" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:image" content="https://creorga.lu/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Creorga OS - Gestion de restaurant" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@creorga_lu" />
    <meta name="twitter:creator" content="@creorga_lu" />
    <meta name="twitter:title" content="Creorga OS — Le POS qui transforme votre restaurant" />
    <meta name="twitter:description" content="Plateforme tout-en-un pour restaurants, bars et hôtels au Luxembourg." />
    <meta name="twitter:image" content="https://creorga.lu/og-image.png" />

    <!-- Alternate languages -->
    <link rel="alternate" hreflang="fr-LU" href="https://creorga.lu/" />
    <link rel="alternate" hreflang="en" href="https://creorga.lu/en" />
    <link rel="alternate" hreflang="de" href="https://creorga.lu/de" />
    <link rel="alternate" hreflang="x-default" href="https://creorga.lu/" />

    <!-- Preconnect / DNS prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://app.creorga.lu" />
    <link rel="preconnect" href="https://app.creorga.lu" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- JSON-LD : Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Creorga",
      "url": "https://creorga.lu/",
      "logo": "https://creorga.lu/logo.png",
      "description": "Éditeur de Creorga OS, la plateforme de gestion pour restaurants au Luxembourg.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "LU",
        "addressLocality": "Luxembourg"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "hello@creorga.lu",
        "availableLanguage": ["fr", "en", "de", "lb"]
      },
      "sameAs": [
        "https://www.linkedin.com/company/creorga",
        "https://twitter.com/creorga_lu"
      ]
    }
    </script>

    <!-- JSON-LD : SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Creorga OS",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "description": "Plateforme tout-en-un pour restaurants, bars et hôtels au Luxembourg : POS, agenda, CRM, conformité TVA et HACCP, IA intégrée.",
      "url": "https://creorga.lu/",
      "inLanguage": "fr-LU",
      "offers": {
        "@type": "Offer",
        "price": "49.00",
        "priceCurrency": "EUR",
        "category": "SaaS subscription"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "42"
      }
    }
    </script>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        color: #0f172a;
        background: #ffffff;
      }
      a { text-decoration: none; color: inherit; }
      button { font-family: inherit; cursor: pointer; border: none; background: none; }
      input, textarea, select { font-family: inherit; }
      @media (max-width: 768px) {
        button, a.btn, input, select { min-height: 44px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>Creorga OS nécessite JavaScript pour fonctionner. Veuillez l'activer.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
